<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>抽卡模拟器 - 狼珀特许寻访</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #2b2b2b;
            font-family: 'Microsoft YaHei', 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主容器 */
        .simulator-container {
            max-width: 1400px;
            width: 100%;
            background-color: #2b2b2b;
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        /* 左侧面板 */
        .left-panel {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* 右侧面板 */
        .right-panel {
            flex: 2;
            min-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* 通用卡片样式 */
        .card {
            background-color: #363636;
            border-radius: 12px;
            border: 1px solid #555555;
            overflow: hidden;
            transition: all 0.2s;
        }

        .card-header {
            background-color: #2f2f2f;
            padding: 12px 18px;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid #4a4a4a;
            color: #e0e0e0;
            letter-spacing: 1px;
        }

        .card-content {
            padding: 16px 18px;
        }

        /* UP角色高亮条 */
        .featured-badge {
            background-color: #4a2a1a;
            color: #FF8A80;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 1rem;
            border-left: 4px solid #FF8A80;
        }

        /* 角色列表滚动 */
        .char-list {
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            padding-right: 5px;
        }

        .char-list::-webkit-scrollbar {
            width: 5px;
        }
        .char-list::-webkit-scrollbar-track {
            background: #2b2b2b;
            border-radius: 4px;
        }
        .char-list::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .rarity-6 { color: #FF8A80; font-weight: bold; }
        .rarity-5 { color: #FFB74D; font-weight: bold; }
        .rarity-4 { color: #B39DDB; font-weight: bold; }
        .up-tag { color: #FFD700; font-size: 0.75rem; margin-left: 4px; }

        /* 历史记录区域 */
        .history-box {
            background-color: #404040;
            border-radius: 10px;
            padding: 12px;
            height: 280px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        .history-item {
            border-bottom: 1px solid #555;
            padding: 4px 0;
            display: flex;
            gap: 8px;
        }
        .history-index {
            color: #aaa;
            font-weight: 500;
            min-width: 55px;
        }

        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 16px;
            margin-top: 5px;
        }
        .stat-item {
            background: #2f2f2f;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #ccc;
        }
        .stat-value {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .stat-value.up { color: #FF8A80; }
        .stat-value.six { color: #FF8A80; }
        .stat-value.five { color: #FFB74D; }
        .stat-value.four { color: #B39DDB; }

        /* 概率/保底行 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
            margin-bottom: 10px;
        }
        .info-cell {
            background: #2f2f2f;
            padding: 8px;
            border-radius: 8px;
        }
        .info-label {
            font-size: 0.75rem;
            color: #aaa;
        }
        .info-number {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 抽卡结果展示 */
        .result-area {
            background-color: #404040;
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            font-size: 1.2rem;
            line-height: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .result-name {
            font-size: 1.6rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
        }

        /* 按钮区域 */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 12px 0;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: white;
        }
        .btn-single {
            background-color: #4CAF50;
        }
        .btn-single:hover {
            background-color: #45a049;
            transform: scale(1.02);
        }
        .btn-ten {
            background-color: #2196F3;
        }
        .btn-ten:hover {
            background-color: #1976D2;
        }
        .btn-reset {
            background-color: #f44336;
        }
        .btn-reset:hover {
            background-color: #d32f2f;
        }
        .btn-free {
            background-color: #FF9800;
        }
        .btn-free:hover {
            background-color: #F57C00;
        }
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
            transform: none;
        }

        hr {
            border-color: #555;
            margin: 8px 0;
        }

        @media (max-width: 800px) {
            body { padding: 10px; }
            .result-name { font-size: 1.2rem; }
            .info-grid { gap: 6px; }
            .button-group button { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="simulator-container">
    <!-- 左侧面板 -->
    <div class="left-panel">
        <!-- 卡池信息 -->
        <div class="card">
            <div class="card-header">📋 卡池信息 · 【狼珀】特许寻访</div>
            <div class="card-content">
                <div class="featured-badge" id="featuredName">✨ 当前UP角色: 洛茜</div>
                <div class="char-list">
                    <div><span class="rarity-6">6★</span> <span id="sixStarList"></span></div>
                    <div style="margin-top: 8px;"><span class="rarity-5">5★</span> <span id="fiveStarList"></span></div>
                    <div style="margin-top: 8px;"><span class="rarity-4">4★</span> <span id="fourStarList"></span></div>
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="card">
            <div class="card-header">📜 历史记录 (最近100条)</div>
            <div class="card-content" style="padding: 8px 12px;">
                <div class="history-box" id="historyBox">
                    <div style="color:#aaa; text-align:center;">暂无抽卡记录</div>
                </div>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="card">
            <div class="card-header">📊 抽卡统计</div>
            <div class="card-content">
                <div class="stats-grid">
                    <div class="stat-item"><span class="stat-label">UP角色获取</span><span class="stat-value up" id="statUp">0</span></div>
                    <div class="stat-item"><span class="stat-label">6★角色</span><span class="stat-value six" id="stat6">0</span></div>
                    <div class="stat-item"><span class="stat-label">5★角色</span><span class="stat-value five" id="stat5">0</span></div>
                    <div class="stat-item"><span class="stat-label">4★角色</span><span class="stat-value four" id="stat4">0</span></div>
                    <div class="stat-item"><span class="stat-label">总抽卡次数</span><span class="stat-value" id="statTotal">0</span></div>
                    <div class="stat-item"><span class="stat-label">平均每6星</span><span class="stat-value" id="statAvg">N/A</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧面板 -->
    <div class="right-panel">
        <!-- 概率&保底 -->
        <div class="card">
            <div class="card-header">🎲 抽卡概率 & 保底计数器</div>
            <div class="card-content">
                <div class="info-grid">
                    <div class="info-cell"><div class="info-label">6★概率</div><div class="info-number" id="rate6">0.80%</div></div>
                    <div class="info-cell"><div class="info-label">5★概率</div><div class="info-number" id="rate5">8.00%</div></div>
                    <div class="info-cell"><div class="info-label">4★概率</div><div class="info-number" id="rate4">91.20%</div></div>
                </div>
                <div class="info-grid">
                    <div class="info-cell"><div class="info-label">6★保底</div><div class="info-number" id="pity6">0/80</div></div>
                    <div class="info-cell"><div class="info-label">5★保底</div><div class="info-number" id="pity5">0/10</div></div>
                    <div class="info-cell"><div class="info-label">限定保底</div><div class="info-number" id="limitedPity">0/120</div></div>
                </div>
            </div>
        </div>

        <!-- 抽卡结果展示 -->
        <div class="card">
            <div class="card-header">🎯 抽卡结果</div>
            <div class="result-area" id="resultArea">
                <div style="color:#aaa;">点击「单抽」或「十连」开始</div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="card">
            <div class="card-header">🎰 抽卡操作</div>
            <div class="card-content">
                <div class="button-group">
                    <button id="singleBtn" class="btn-single">单抽</button>
                    <button id="tenBtn" class="btn-ten">十连</button>
                </div>
                <div class="button-group" style="margin-top: 12px;">
                    <button id="resetBtn" class="btn-reset">重置全部数据</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 角色数据 ----------
    // 6星角色 (name, rarity, featured)
    const sixStarChars = [
        { name: "洛茜", rarity: 6, featured: true },
        { name: "汤汤", rarity: 6, featured: false },
        { name: "伊冯", rarity: 6, featured: false },
        { name: "余烬", rarity: 6, featured: false },
        { name: "黎风", rarity: 6, featured: false },
        { name: "艾尔黛拉", rarity: 6, featured: false },
        { name: "别礼", rarity: 6, featured: false },
        { name: "骏卫", rarity: 6, featured: false }
    ];
    const fiveStarChars = [
        { name: "佩丽卡", rarity: 5, featured: false }, { name: "弧光", rarity: 5, featured: false },
        { name: "艾维文娜", rarity: 5, featured: false }, { name: "大潘", rarity: 5, featured: false },
        { name: "陈千语", rarity: 5, featured: false }, { name: "狼卫", rarity: 5, featured: false },
        { name: "赛希", rarity: 5, featured: false }, { name: "昼雪", rarity: 5, featured: false },
        { name: "阿列什", rarity: 5, featured: false }
    ];
    const fourStarChars = [
        { name: "秋栗", rarity: 4, featured: false }, { name: "卡契尔", rarity: 4, featured: false },
        { name: "埃特拉", rarity: 4, featured: false }, { name: "萤石", rarity: 4, featured: false },
        { name: "安塔尔", rarity: 4, featured: false }
    ];
    const allCharacters = [...sixStarChars, ...fiveStarChars, ...fourStarChars];
    const featuredOperator = sixStarChars.find(c => c.featured === true);

    // ---------- Banner 状态 ----------
    let bannerState = {
        // 基础概率
        baseRates: { 6: 0.008, 5: 0.08, 4: 0.912 },
        currentRates: { 6: 0.008, 5: 0.08, 4: 0.912 },
        // 计数器
        pullCount: 0,           // 本次连抽计数(用于概率提升)
        pity5: 0,
        pity6: 0,
        pityFeatured: 0,
        pityFeaturedAvailable: true,   // 限定保底是否可用(拿到限定后重置可用)
        rateUpAvailable: false,
        rateUpStart: 65,
        
        totalPulls: 0,
        pullHistory: [],        // 存储角色对象
        rarityCounts: { 6: 0, 5: 0, 4: 0 },
        featuredCount: 0,
        
        freeTenPullAvailable: false,
        freeTenPullTriggered: false,
    };

    // 辅助函数: 获取同星级非限定角色(用于歪)
    function getNonFeaturedByRarity(rarity) {
        let pool = allCharacters.filter(c => c.rarity === rarity && !c.featured);
        if (pool.length === 0) pool = allCharacters.filter(c => c.rarity === rarity);
        return pool[Math.floor(Math.random() * pool.length)];
    }
    function getAllByRarity(rarity) {
        let pool = allCharacters.filter(c => c.rarity === rarity);
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 计算动态概率 (基于保底和计数)
    function calculateCurrentRates(state) {
        let { pity6, rateUpAvailable, rateUpStart, baseRates } = state;
        let newRates = { ...baseRates };
        if (pity6 >= rateUpStart && !rateUpAvailable) {
            state.rateUpAvailable = true;
            let increment = 0.05 * (pity6 - rateUpStart);
            newRates[6] = baseRates[6] + increment;
            newRates[4] = baseRates[4] - increment;
            newRates[5] = baseRates[5];
        } else if (state.rateUpAvailable) {
            let increment = 0.05 * (pity6 - rateUpStart);
            newRates[6] = baseRates[6] + increment;
            newRates[4] = baseRates[4] - increment;
            newRates[5] = baseRates[5];
        } else {
            newRates = { ...baseRates };
        }
        // 归一化修正浮点误差
        let total = newRates[6] + newRates[5] + newRates[4];
        if (Math.abs(total - 1.0) > 0.0001) newRates[4] += 1.0 - total;
        state.currentRates = newRates;
        return newRates;
    }

    // 执行单抽核心逻辑
    function performPull(isFreePull = false, savedContext = null) {
        // 免费十连使用特殊逻辑：不改变原保底（在外层实现），此处为单抽调用（非免费模式）
        if (isFreePull) {
            // 免费十连内部独立抽卡逻辑 (无保底继承，仅统计)
            let rand = Math.random();
            let rarity = 4;
            if (rand < bannerState.baseRates[6]) rarity = 6;
            else if (rand < bannerState.baseRates[6] + bannerState.baseRates[5]) rarity = 5;
            else rarity = 4;
            
            let result = null;
            if (rarity === 6) {
                // 50%概率限定 (并且限定保底可用标记沿用原状态，但免费十连不影响保底, 但为模拟正常出货，沿用规则但无需改变原有pityFeaturedAvailable)
                if (Math.random() < 0.5 && bannerState.pityFeaturedAvailable) {
                    result = featuredOperator;
                    bannerState.featuredCount++;
                } else {
                    result = getNonFeaturedByRarity(6);
                }
            } else {
                result = getAllByRarity(rarity);
            }
            // 免费抽只增加总次数和统计, 不改变任何保底计数器
            bannerState.totalPulls++;
            bannerState.rarityCounts[rarity]++;
            bannerState.pullHistory.push(result);
            if (bannerState.pullHistory.length > 1000) bannerState.pullHistory.shift();
            return result;
        }
        
        // 普通抽卡 (改变保底)
        bannerState.pullCount++;
        bannerState.totalPulls++;
        bannerState.pity5++;
        bannerState.pity6++;
        if (bannerState.pityFeaturedAvailable) bannerState.pityFeatured++;
        
        calculateCurrentRates(bannerState);
        let rates = bannerState.currentRates;
        let rand = Math.random();
        let rarity = 4;
        if (rand < rates[6]) rarity = 6;
        else if (rand < rates[6] + rates[5]) rarity = 5;
        else rarity = 4;
        
        // 硬保底修正
        if (bannerState.pity6 >= 80) rarity = 6;
        else if (rarity === 4 && bannerState.pity5 >= 10) rarity = 5;
        
        let result = null;
        // 限定保底120硬吃
        if (bannerState.pityFeatured >= 120 && bannerState.pityFeaturedAvailable) {
            rarity = 6;
            result = featuredOperator;
            bannerState.featuredCount++;
        } 
        else if (rarity === 6) {
            // 6星: 50%限定
            if (Math.random() < 0.5) {
                result = featuredOperator;
                bannerState.featuredCount++;
            } else {
                result = getNonFeaturedByRarity(6);
            }
        } else {
            result = getAllByRarity(rarity);
        }
        
        // 更新保底计数器
        if (rarity === 6) {
            bannerState.pity6 = 0;
            bannerState.rateUpAvailable = false;
            if (result === featuredOperator) {
                bannerState.pityFeaturedAvailable = false;
                bannerState.pityFeatured = 0;
            }
        }
        if (rarity >= 5) {
            bannerState.pity5 = 0;
        }
        
        bannerState.rarityCounts[rarity]++;
        bannerState.pullHistory.push(result);
        if (bannerState.pullHistory.length > 1000) bannerState.pullHistory.shift();
        return result;
    }
    
    // 十连抽 (普通)
    function tenPull() {
        let results = [];
        for (let i = 0; i < 10; i++) {
            results.push(performPull(false));
        }
        return results;
    }
    
    // 免费十连: 不影响原保底，独立抽取，消耗免费机会
    function freeTenPull() {
        let results = [];
        // 暂存原有计数相关（免费十连仅统计次数，不改保底，但总抽次数要加，历史要加，统计要加）
        // 注意performPull中的免费模式已经做了，但这里需要循环调用免费模式
        for (let i = 0; i < 10; i++) {
            let res = performPull(true);
            results.push(res);
        }
        bannerState.freeTenPullAvailable = false;
        return results;
    }
    
    // 检查并触发免费十连标记（抽卡后调用）
    function checkFreeTenPullTrigger() {
        if (!bannerState.freeTenPullTriggered && bannerState.totalPulls >= 30) {
            bannerState.freeTenPullAvailable = true;
            bannerState.freeTenPullTriggered = true;
            updateFreeTenButtonUI();
            return true;
        }
        return false;
    }
    
    // 重置所有
    function resetSimulation() {
        bannerState = {
            baseRates: { 6: 0.008, 5: 0.08, 4: 0.912 },
            currentRates: { 6: 0.008, 5: 0.08, 4: 0.912 },
            pullCount: 0,
            pity5: 0,
            pity6: 0,
            pityFeatured: 0,
            pityFeaturedAvailable: true,
            rateUpAvailable: false,
            rateUpStart: 65,
            totalPulls: 0,
            pullHistory: [],
            rarityCounts: { 6: 0, 5: 0, 4: 0 },
            featuredCount: 0,
            freeTenPullAvailable: false,
            freeTenPullTriggered: false,
        };
        // 重置UI按钮状态
        const tenBtn = document.getElementById('tenBtn');
        tenBtn.disabled = false;
        tenBtn.textContent = "十连";
        tenBtn.classList.remove('btn-free');
        tenBtn.classList.add('btn-ten');
        const singleBtn = document.getElementById('singleBtn');
        singleBtn.disabled = false;
        updateAllDisplay();
        document.getElementById('resultArea').innerHTML = '<div style="color:#aaa;">已重置，可以重新开始抽卡</div>';
    }
    
    // UI更新
    function updateRatesDisplay() {
        let rates = bannerState.currentRates;
        document.getElementById('rate6').innerText = (rates[6] * 100).toFixed(2) + "%";
        document.getElementById('rate5').innerText = (rates[5] * 100).toFixed(2) + "%";
        document.getElementById('rate4').innerText = (rates[4] * 100).toFixed(2) + "%";
    }
    function updatePityDisplay() {
        document.getElementById('pity6').innerText = `${bannerState.pity6}/80`;
        document.getElementById('pity5').innerText = `${bannerState.pity5}/10`;
        let limitedMark = bannerState.pityFeaturedAvailable ? "" : "✓";
        document.getElementById('limitedPity').innerHTML = `${bannerState.pityFeatured}/120 ${limitedMark}`;
    }
    function updateStatsDisplay() {
        document.getElementById('statUp').innerText = bannerState.featuredCount;
        document.getElementById('stat6').innerText = bannerState.rarityCounts[6];
        document.getElementById('stat5').innerText = bannerState.rarityCounts[5];
        document.getElementById('stat4').innerText = bannerState.rarityCounts[4];
        document.getElementById('statTotal').innerText = bannerState.totalPulls;
        if (bannerState.rarityCounts[6] > 0) {
            let avg = (bannerState.totalPulls / bannerState.rarityCounts[6]).toFixed(1);
            document.getElementById('statAvg').innerText = avg + "抽";
        } else {
            document.getElementById('statAvg').innerText = "N/A";
        }
    }
    function updateHistoryDisplay() {
        let historyBox = document.getElementById('historyBox');
        let recent = bannerState.pullHistory.slice(-100);
        if (recent.length === 0) {
            historyBox.innerHTML = '<div style="color:#aaa; text-align:center;">暂无抽卡记录</div>';
            return;
        }
        let startIdx = Math.max(0, bannerState.pullHistory.length - 100);
        let html = '';
        recent.forEach((char, idx) => {
            let indexNum = startIdx + idx + 1;
            let colorClass = '';
            let starDisplay = '';
            if (char.rarity === 6) colorClass = 'rarity-6';
            else if (char.rarity === 5) colorClass = 'rarity-5';
            else colorClass = 'rarity-4';
            let upTag = (char.featured && char.rarity===6) ? '<span class="up-tag">(UP)</span>' : '';
            html += `<div class="history-item">
                        <span class="history-index">[${String(indexNum).padStart(3,'0')}]</span>
                        <span class="${colorClass}">${char.name}</span>${upTag}
                     </div>`;
        });
        historyBox.innerHTML = html;
    }
    function updateFreeTenButtonUI() {
        const tenBtn = document.getElementById('tenBtn');
        if (bannerState.freeTenPullAvailable) {
            tenBtn.textContent = "🎁 免费十连";
            tenBtn.classList.remove('btn-ten');
            tenBtn.classList.add('btn-free');
            document.getElementById('singleBtn').disabled = true;  // 免费十连期间禁用单抽
        } else {
            tenBtn.textContent = "十连";
            tenBtn.classList.remove('btn-free');
            tenBtn.classList.add('btn-ten');
            document.getElementById('singleBtn').disabled = false;
        }
    }
    function updateAllDisplay() {
        updateRatesDisplay();
        updatePityDisplay();
        updateStatsDisplay();
        updateHistoryDisplay();
    }
    
    // 展示抽卡结果(单次或十连)
    function displayPullResult(results, isTenPull = false) {
        let resultArea = document.getElementById('resultArea');
        if (!isTenPull) {
            let char = results;
            let color = char.rarity === 6 ? '#FF8A80' : (char.rarity === 5 ? '#FFB74D' : '#B39DDB');
            let upText = (char.featured && char.rarity===6) ? ' ✨UP✨' : '';
            resultArea.innerHTML = `<div class="result-name" style="background:${color}20; border-left:6px solid ${color};">${char.name}${upText}</div>`;
        } else {
            let itemsHtml = '';
            results.forEach(char => {
                let color = char.rarity === 6 ? '#FF8A80' : (char.rarity === 5 ? '#FFB74D' : '#B39DDB');
                let upFlag = (char.featured && char.rarity===6) ? ' (UP)' : '';
                itemsHtml += `<div style="font-size:1rem; margin:6px 0;"><span style="color:${color}; font-weight:bold;">${char.name}</span>${upFlag}</div>`;
            });
            resultArea.innerHTML = `<div style="max-height:200px; overflow-y:auto; width:100%;">${itemsHtml}</div>`;
        }
    }
    
    // 单抽业务
    function singlePull() {
        if (bannerState.freeTenPullAvailable) {
            alert("请先使用免费十连，再继续单抽");
            return;
        }
        let result = performPull(false);
        displayPullResult(result, false);
        updateAllDisplay();
        checkFreeTenPullTrigger();
        updateFreeTenButtonUI();
    }
    
    // 十连业务
    function tenPullHandler() {
        if (bannerState.freeTenPullAvailable) {
            // 执行免费十连
            let results = freeTenPull();
            displayPullResult(results, true);
            updateAllDisplay();
            // 免费十连结束后恢复按钮
            updateFreeTenButtonUI();
            // 免费十连后单抽按钮恢复
            document.getElementById('singleBtn').disabled = false;
        } else {
            let results = tenPull();
            displayPullResult(results, true);
            updateAllDisplay();
            checkFreeTenPullTrigger();
            updateFreeTenButtonUI();
        }
    }
    
    // 初始化角色列表显示
    function initCharacterList() {
        let sixHtml = sixStarChars.map(c => `<span class="rarity-6">${c.name}</span>${c.featured ? '<span class="up-tag">(UP)</span>' : ''}`).join('  ');
        let fiveHtml = fiveStarChars.map(c => `<span class="rarity-5">${c.name}</span>`).join('  ');
        let fourHtml = fourStarChars.map(c => `<span class="rarity-4">${c.name}</span>`).join('  ');
        document.getElementById('sixStarList').innerHTML = sixHtml;
        document.getElementById('fiveStarList').innerHTML = fiveHtml;
        document.getElementById('fourStarList').innerHTML = fourHtml;
        document.getElementById('featuredName').innerHTML = `✨ 当前UP角色: ${featuredOperator.name}`;
    }
    
    // 绑定事件
    function bindEvents() {
        document.getElementById('singleBtn').addEventListener('click', singlePull);
        document.getElementById('tenBtn').addEventListener('click', tenPullHandler);
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('重置后所有抽卡记录和保底将会清空，确定吗？')) {
                resetSimulation();
                updateFreeTenButtonUI();
            }
        });
    }
    
    // 启动
    function main() {
        initCharacterList();
        bindEvents();
        updateAllDisplay();
        updateFreeTenButtonUI();
    }
    
    main();
</script>
</body>
</html>
